name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Package extension
        run: |
          zip -r tab-volume-control-${{ github.ref_name }}.zip \
            manifest.json \
            popup.html \
            popup.css \
            popup.js \
            content.js \
            icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tab-volume-control-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

