name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build Extension ZIP
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          zip -r tab-volume-control-${{ github.sha }}.zip \
            manifest.json \
            popup.html \
            popup.css \
            popup.js \
            content.js \
            icons/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tab-volume-control-${{ github.sha }}
          path: tab-volume-control-${{ github.sha }}.zip
          retention-days: 7
